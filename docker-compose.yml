services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start:api
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start:worker
    env_file:
      - .env
    restart: unless-stopped